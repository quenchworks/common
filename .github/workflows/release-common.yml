name: release-common

on:
  push:
    branches: [main]
    paths:
      - "quench-common/**"
      - ".github/workflows/release-common.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write        # push the OCI chart to GHCR
  id-token: write        # cosign keyless

env:
  CHART_DIR: quench-common
  OCI_REPO: oci://ghcr.io/quenchworks/charts

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # pin actions to SHAs before going public (renovate)
      - uses: actions/checkout@v5
      - uses: azure/setup-helm@v5
      - uses: sigstore/cosign-installer@v3

      # cosign signs by pushing to GHCR and reads ~/.docker/config.json for creds.
      - name: Log in to GHCR (for cosign)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint (library chart has no installable templates)
        run: helm lint "${CHART_DIR}"

      - name: Package and push (OCI)
        id: push
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          helm package "${CHART_DIR}" -d ./dist
          helm push ./dist/quench-common-*.tgz "${OCI_REPO}" 2>&1 | tee push.txt
          digest="$(awk '/Digest:/ {print $2}' push.txt)"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Sign chart (cosign keyless)
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign "ghcr.io/quenchworks/charts/quench-common@${{ steps.push.outputs.digest }}"
